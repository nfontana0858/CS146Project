<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>
    <link rel="stylesheet" href="Style.css">
    <link rel="stylesheet" href="calendar.css">
</head>
<body>

<header>
    <h1>Calendar</h1>
</header>

<nav> <!-- Add any webpages part of the site below -->
        <a href="index.html">Home</a>
        <a href="calendar.html">Calendar</a>
        <a href="calendar_info.html">Calendar Info</a>
        <a href="groups.html">Groups</a>
        <a href="about.html">About</a>
    </nav>


<main>
    <section id="calendar-container">
        <div class="calendar-header">
            <button class="cal-nav-btn" id="prev-month">&#8592; Prev</button>
            <h2 id="month-label">Month Year</h2>
            <button class="cal-nav-btn" id="next-month">Next &#8594;</button>
        </div>

        <div class="calendar-grid" id="calendar-grid">
            <div class="day-label">Sun</div>
            <div class="day-label">Mon</div>
            <div class="day-label">Tue</div>
            <div class="day-label">Wed</div>
            <div class="day-label">Thu</div>
            <div class="day-label">Fri</div>
            <div class="day-label">Sat</div>
        </div>
    </section>
</main>

<section id="event-form-section">
    <h2>Add Calendar Event</h2>

    <form id="event-form">
        <label for="event-title">Event Title:</label>
        <input type="text" id="event-title" required>

        <label for="event-date">Event Date:</label>
        <input type="date" id="event-date" required>

        <label for="event-notes">Notes:</label>
        <textarea id="event-notes"></textarea>

        <button type="submit">Add Event</button>
    </form>
</section>


<footer>
    <p>Planner Website Project | Stevens Institute of Technology</p>

    <p>&copy; 2026 Planner Team</p>
</footer>

<script src="calendar.js"></script>

</body>
</html>
